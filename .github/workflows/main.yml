name: Déployer ASCENSION Wiki

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Récupérer les fichiers
        uses: actions/checkout@v6

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer le wiki
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./site"

      - name: Publier le wiki
        id: deployment
        uses: actions/deploy-pages@v4
