<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b090b">
  <meta name="robots" content="noindex">
  <title>Page introuvable — ASCENSION Wiki</title>
  <style>
    *{box-sizing:border-box} body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top,#2b1a15,#0b090b 55%);color:#f2eee6;font-family:Segoe UI,Arial,sans-serif;text-align:center}.card{max-width:690px;padding:38px;border:1px solid rgba(231,187,100,.2);border-radius:22px;background:rgba(18,19,25,.9);box-shadow:0 20px 60px rgba(0,0,0,.5)}.code{font-size:clamp(4rem,14vw,8rem);line-height:1;color:#e7bb64;font-weight:900}h1{font-size:clamp(1.8rem,5vw,3rem)}p{color:#c1b5a8;line-height:1.65}a{display:inline-block;margin-top:12px;padding:12px 18px;border-radius:10px;background:linear-gradient(#efc978,#c98b38);color:#1f150d;text-decoration:none;font-weight:800}
  </style>
</head>
<body>
  <main class="card">
    <div class="code">404</div>
    <h1>Cette archive s’est perdue dans les cendres.</h1>
    <p>La page demandée n’existe pas ou a été déplacée.</p>
    <a id="home" href="/ascension-wiki/">Retour au wiki</a>
  </main>
  <script>
    if (!location.hostname.endsWith('github.io')) document.getElementById('home').href = '/';
  </script>
</body>
</html>
